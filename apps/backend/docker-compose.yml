services:
  db:
    image: postgres:15-alpine
    container_name: got-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: gotdb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: